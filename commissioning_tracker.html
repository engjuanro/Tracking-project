<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>COMECER MIP-1100 · Commissioning Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0c0f;--bg2:#111318;--bg3:#181c22;--border:#252930;
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);
  --green:#10b981;--green-dim:rgba(16,185,129,0.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,0.12);
  --orange:#f97316;--orange-dim:rgba(249,115,22,0.12);
  --text:#e2e8f0;--text-dim:#64748b;--text-mid:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
body.view-mode .edit-only{display:none!important;}

/* PIN POPUP */
.pin-popup{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.pin-popup.open{display:flex;}
.pin-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:28px 32px;width:320px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,0.7);}
.pin-box-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;}
.pin-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Space Mono',monospace;font-size:18px;padding:10px 14px;outline:none;transition:border-color 0.15s;letter-spacing:0.2em;text-align:center;}
.pin-input:focus{border-color:var(--amber);}
.pin-input::placeholder{font-size:13px;letter-spacing:0.05em;color:var(--text-dim);}
.pin-error{color:var(--red);font-size:11px;font-family:'Space Mono',monospace;min-height:14px;margin-top:7px;text-align:center;}
.pin-actions{display:flex;gap:8px;margin-top:14px;}
.btn-go{flex:1;background:var(--amber);color:#000;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.1em;padding:10px;border-radius:4px;cursor:pointer;text-transform:uppercase;transition:opacity 0.15s;}
.btn-go:hover{opacity:0.88;}
.btn-nope{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.08em;padding:10px 16px;border-radius:4px;cursor:pointer;text-transform:uppercase;transition:all 0.15s;}
.btn-nope:hover{border-color:var(--text-mid);color:var(--text);}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;gap:18px;height:60px;position:sticky;top:0;z-index:100;}
.header-badge{background:var(--amber);color:#000;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;letter-spacing:0.1em;border-radius:2px;user-select:none;cursor:default;}
.header-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;letter-spacing:0.05em;color:#fff;}
.header-sub{font-size:11px;color:var(--text-dim);font-family:'Space Mono',monospace;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:14px;}
.live-clock{font-family:'Space Mono',monospace;font-size:11px;color:var(--amber);}
.overall-bar{width:100px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.overall-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--green));border-radius:3px;transition:width 0.6s cubic-bezier(.4,0,.2,1);}
.overall-pct{font-family:'Space Mono',monospace;font-size:11px;color:var(--amber);}
.overall-progress{display:flex;align-items:center;gap:8px;}
.editor-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);display:none;animation:pulse 2s infinite;cursor:pointer;}
body:not(.view-mode) .editor-dot{display:block;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* MAIN */
.main{max-width:1300px;margin:0 auto;padding:28px 20px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:26px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:14px 16px;position:relative;overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s;}
.stat-card:hover{transform:translateY(-1px);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,var(--amber));}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.15em;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px;}
.stat-count{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:#fff;line-height:1;}
.stat-count span{font-size:12px;color:var(--text-dim);}
.stat-bar{margin-top:8px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;background:var(--cc,var(--amber));border-radius:2px;transition:width 0.6s cubic-bezier(.4,0,.2,1);opacity:0.85;}

/* CONTROLS */
.controls-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.08em;padding:5px 14px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.15s;text-transform:uppercase;}
.filter-btn:hover,.filter-btn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
.search-box{margin-left:auto;position:relative;}
.search-box input{background:var(--bg2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:6px 12px 6px 30px;outline:none;width:200px;transition:border-color 0.15s;}
.search-box input:focus{border-color:var(--amber);}
.search-box input::placeholder{color:var(--text-dim);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:12px;pointer-events:none;}
.add-btn{display:flex;align-items:center;gap:7px;background:var(--amber);color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.1em;padding:6px 16px;border:none;border-radius:3px;cursor:pointer;text-transform:uppercase;transition:opacity 0.15s,transform 0.1s;}
.add-btn:hover{opacity:0.9;transform:translateY(-1px);}

/* CATEGORY */
.category-group{margin-bottom:24px;}
.cat-header{display:flex;align-items:center;gap:10px;padding:8px 0 7px;border-bottom:1px solid var(--border);margin-bottom:6px;}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cat-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;}
.cat-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);margin-left:auto;}

/* TASK CARD */
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:border-color 0.15s;animation:slideIn 0.22s ease;margin-bottom:3px;}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.task-card:hover{border-color:#2d3340;}
.task-card.done{opacity:0.5;}
.task-card.done .task-title{text-decoration:line-through;color:var(--text-dim);}
.task-main{display:flex;align-items:flex-start;padding:11px 14px;cursor:default;}
body:not(.view-mode) .task-main{cursor:pointer;}
.task-checkbox{flex-shrink:0;width:18px;height:18px;border:2px solid var(--border);border-radius:3px;margin-right:12px;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.task-card.done .task-checkbox{background:var(--green);border-color:var(--green);}
.task-checkbox svg{opacity:0;transform:scale(0.5);transition:all 0.15s;}
.task-card.done .task-checkbox svg{opacity:1;transform:scale(1);}
.task-body{flex:1;min-width:0;}
.task-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.5;margin-bottom:3px;}
.task-hint{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.5;}
.task-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:4px;}
.task-cat-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;border-radius:2px;border:1px solid;opacity:0.75;}
.task-priority{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.05em;padding:2px 5px;border-radius:2px;text-transform:uppercase;}
.prio-high{background:var(--red-dim);color:var(--red);border:1px solid var(--red);opacity:0.85;}
.prio-med{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber);opacity:0.75;}
.prio-low{background:var(--green-dim);color:var(--green);border:1px solid var(--green);opacity:0.75;}
.alarm-type-tag{font-family:'Space Mono',monospace;font-size:9px;padding:2px 5px;border-radius:2px;text-transform:uppercase;}
.mach-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;padding:2px 7px;border-radius:2px;text-transform:uppercase;}
.mach-MIP{background:rgba(249,115,22,0.15);color:var(--orange);border:1px solid var(--orange);}
.mach-BBS{background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid var(--blue);}
.mach-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.1em;padding:4px 10px;border-radius:3px;border:1px solid;background:transparent;cursor:pointer;transition:all 0.15s;text-transform:uppercase;}
.mach-btn:hover{opacity:0.9;}
.mach-btn.active-mach{filter:brightness(1.2);box-shadow:0 0 8px rgba(255,255,255,0.1);}
.hw{background:var(--red-dim);color:var(--red);border:1px solid var(--red);}
.sw{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue);}
.hw-sw{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange);}
.alarm-code-lbl{
  font-family:'Space Mono',monospace;
  font-size:9px;
  font-weight:700;
  color:var(--text-dim);
  letter-spacing:0.12em;
  margin-bottom:2px;
  text-transform:uppercase;
}
.task-actions{display:flex;align-items:center;gap:3px;margin-left:10px;}
.icon-btn{background:transparent;border:none;color:var(--text-dim);cursor:pointer;padding:4px;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:color 0.15s,background 0.15s;}
.icon-btn:hover{color:var(--amber);background:var(--amber-dim);}
.icon-btn.del:hover{color:var(--red);background:var(--red-dim);}

/* COMMENT PANEL */
.comment-panel{border-top:1px solid var(--border);padding:10px 14px 12px 44px;display:none;background:var(--bg3);}
.comment-panel.open{display:block;animation:slideIn 0.2s ease;}
.comment-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;}
.comment-history{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;max-height:100px;overflow-y:auto;}
.comment-entry{font-size:12px;color:var(--text-mid);line-height:1.5;display:flex;gap:8px;align-items:baseline;}
.comment-ts{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);flex-shrink:0;}
.comment-row{display:flex;gap:8px;}
.comment-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Barlow',sans-serif;font-size:12px;padding:6px 10px;outline:none;transition:border-color 0.15s;resize:none;}
.comment-input:focus{border-color:var(--amber);}
.comment-input::placeholder{color:var(--text-dim);}
.comment-save{background:var(--amber);color:#000;border:none;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.1em;padding:6px 12px;cursor:pointer;text-transform:uppercase;white-space:nowrap;}
.comment-save:hover{opacity:0.85;}

/* LOCK BUTTON — bottom right corner */
.lock-btn{
  position:fixed;bottom:20px;left:20px;
  width:32px;height:32px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:50;
  opacity:0.35;transition:opacity 0.2s,border-color 0.2s;
  font-size:13px;
}
.lock-btn:hover{opacity:1;border-color:var(--amber);}
/* When editor: show unlock style */
body:not(.view-mode) .lock-btn{
  background:var(--amber-dim);border-color:var(--amber);opacity:0.8;
}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:26px;width:500px;max-width:95vw;box-shadow:0 24px 80px rgba(0,0,0,0.6);animation:mIn 0.2s ease;}
@keyframes mIn{from{opacity:0;transform:scale(0.95) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:18px;color:#fff;}
.form-row{margin-bottom:12px;}
.form-label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color 0.15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--amber);}
.form-textarea{resize:vertical;min-height:55px;}
.form-select option{background:var(--bg2);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.1em;padding:8px 18px;border-radius:3px;cursor:pointer;text-transform:uppercase;transition:all 0.15s;}
.btn-cancel:hover{border-color:var(--text-mid);color:var(--text);}
.btn-submit{background:var(--amber);color:#000;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.1em;padding:8px 22px;border-radius:3px;cursor:pointer;text-transform:uppercase;}
.btn-submit:hover{opacity:0.88;}

.empty-state{text-align:center;padding:40px 0;color:var(--text-dim);font-size:13px;}
.toast{position:fixed;bottom:22px;right:22px;background:var(--green);color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.1em;padding:9px 18px;border-radius:4px;z-index:999;transform:translateY(70px);opacity:0;transition:all 0.25s cubic-bezier(.4,0,.2,1);text-transform:uppercase;}
.toast.show{transform:translateY(0);opacity:1;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr);}.header-sub,.live-clock,.overall-progress{display:none;}}
</style>
</head>
<body class="view-mode">

<!-- HIDDEN PIN POPUP -->
<div class="pin-popup" id="pinPopup" onclick="pinPopupBg(event)">
  <div class="pin-box">
    <div class="pin-box-title">Access Required</div>
    <input class="pin-input" id="pinField" type="password" placeholder="Enter access code" autocomplete="off"
      onkeydown="if(event.key==='Enter') tryUnlock()"/>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-actions">
      <button class="btn-nope" onclick="closePin()">Cancel</button>
      <button class="btn-go" onclick="tryUnlock()">Confirm</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-badge" id="headerBadge">V0653</div>
  <div>
    <div class="header-title">COMMISSIONING TRACKER</div>
    <div class="header-sub">COMECER INC · MIP-1100 & BBS</div>
  </div>
  <div class="header-right">
    <div class="overall-progress">
      <div class="overall-bar"><div class="overall-fill" id="overallFill" style="width:0%"></div></div>
      <div class="overall-pct" id="overallPct">0%</div>
    </div>
    <div class="live-clock" id="clock"></div>
    <div class="editor-dot" title="Editor mode — click to exit" onclick="lockEditor()"></div>
  </div>
</header>

<div class="main">
  <div class="stats-row">
    <div class="stat-card" style="--cc:var(--red)"    onclick="filterCat('ALARMS')">
      <div class="stat-label">🚨 HMI Alarms</div>
      <div class="stat-count" id="stat-a">0 <span>/ 0</span></div>
      <div class="stat-bar"><div class="stat-fill" id="fill-a" style="width:0%"></div></div>
    </div>
    <div class="stat-card" style="--cc:var(--amber)"  onclick="filterCat('ELECTRICAL')">
      <div class="stat-label">⚡ Electrical</div>
      <div class="stat-count" id="stat-e">0 <span>/ 0</span></div>
      <div class="stat-bar"><div class="stat-fill" id="fill-e" style="width:0%"></div></div>
    </div>
    <div class="stat-card" style="--cc:var(--blue)"   onclick="filterCat('PROGRAMMING')">
      <div class="stat-label">💻 HMI Programming</div>
      <div class="stat-count" id="stat-p">0 <span>/ 0</span></div>
      <div class="stat-bar"><div class="stat-fill" id="fill-p" style="width:0%"></div></div>
    </div>
    <div class="stat-card" style="--cc:var(--green)"  onclick="filterCat('MECHANICAL')">
      <div class="stat-label">🔧 Mechanical</div>
      <div class="stat-count" id="stat-m">0 <span>/ 0</span></div>
      <div class="stat-bar"><div class="stat-fill" id="fill-m" style="width:0%"></div></div>
    </div>
    <div class="stat-card" style="--cc:var(--purple)" onclick="filterCat('PLC')">
      <div class="stat-label">🔲 PLC Program</div>
      <div class="stat-count" id="stat-plc">0 <span>/ 0</span></div>
      <div class="stat-bar"><div class="stat-fill" id="fill-plc" style="width:0%"></div></div>
    </div>
    <div class="stat-card" style="--cc:var(--orange)" onclick="filterCat('DOCUMENTATION')">
      <div class="stat-label">📋 Documentation</div>
      <div class="stat-count" id="stat-doc">0 <span>/ 0</span></div>
      <div class="stat-bar"><div class="stat-fill" id="fill-doc" style="width:0%"></div></div>
    </div>
  </div>

  <div class="controls-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <button class="mach-btn" id="machAll" onclick="setMachFilter(null)" style="border-color:var(--amber);color:var(--amber);background:var(--amber-dim)">ALL</button>
    <button class="mach-btn" id="machMIP" onclick="setMachFilter('MIP')" style="border-color:var(--orange);color:var(--orange)">MIP</button>
    <button class="mach-btn" id="machBBS" onclick="setMachFilter('BBS')" style="border-color:var(--blue);color:var(--blue)">BBS</button>
    <button class="add-btn edit-only" onclick="openModal()">+ Add Task</button>
    <button class="add-btn edit-only" onclick="generateDailyReport()" style="background:#10b981;border-color:#10b981">&#128202; Daily Report</button>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search tasks…" oninput="renderTasks()"/>
    </div>
  </div>

  <div id="taskList"></div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-title">+ New Task</div>
    <div class="form-row">
      <label class="form-label">Task Description</label>
      <textarea class="form-textarea" id="newTitle" placeholder="Describe the task…" rows="2"></textarea>
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Category</label>
        <select class="form-select" id="newCat">
          <option value="ALARMS">🚨 HMI Alarms</option>
          <option value="ELECTRICAL">⚡ Electrical</option>
          <option value="PROGRAMMING">💻 HMI Programming</option>
          <option value="MECHANICAL">🔧 Mechanical</option>
          <option value="PLC">🔲 PLC Program</option>
          <option value="DOCUMENTATION">📋 Documentation</option>
        </select>

    {id:'plc3',cat:'PLC',prio:'high',done:true,doneAt:'Mar 28, 08:00 PM',comments:[{ts:'Mar 23, 09:15 PM',text:'A1301 electric motor removed from schematic — ITD now pneumatic. PLC logic must be rewritten: remove motor drive logic (KM1301 brake, inverter ready E6.0), replace with solenoid valve open/close outputs for pneumatic cylinder. In progress.'},{ts:'Mar 23, 11:50 PM',text:'INTERLOCK NOTE: Prechamber ELD gasket CANNOT be deflated unless ITD is confirmed CLOSED and ITD gasket is INFLATED. This safety interlock must be programmed into the new PLC logic — if ITD is open or ITD gasket is not inflated, block ELD prechamber gasket deflate command (A3.1 YV9091B).'},{ts:'Mar 24, 12:10 AM',text:'PLC TAGS for STD reference (corrected): M190.0 (%M190.0) = P TRIGGER inflate lateral door seal pre-chamber. M190.1 (%M190.1) = P TRIGGER deflate lateral door seal pre-chamber. M190.2 (%M190.2) = TRIGGER inflate lateral door seal pre-chamber. M190.3 (%M190.3) = TRIGGER deflate lateral door seal pre-chamber. Tags in PLC tag table MIP_DUAL_LAF_V04_V18, rows 93-96. M190.0/M190.1 are P (pulse) triggers, M190.2/M190.3 are sustained triggers. Keep for STD documentation.'},{ts:'Mar 24, 12:35 AM',text:'MODIFIED PLC BLOCKS (not yet compiled/downloaded — not green in TIA Portal): FC52_Porte e Guarnizioni, FC56_Trigger, FC90_Interlock, FC91_Allarmi, DB90_Interlocks HMI, DB91_Allarmi_HMI, DB92_Interlocks HMI_Cumulativi, DB72_Optional_HMI, DB101_Timer_Allarmi. Total 9 blocks changed during this session for: ELD Prechamber interlocks (W173-W177), ITD pneumatic logic, trigger tags, A078 alarm (inflar/desinflar sello ELD), Optional_39 HMI SETUP, and timer configuration. Must compile and download to PLC before testing.'},{ts:'Mar 25, 09:15 AM',text:'FC52 Network 13 DOCUMENTED (ELD pre-chamber deflate and inflate door seal): INFLATE — M51.1 (#E1.1) → TON DB100.DBX880.0 Timer_Gonfia_Automatico_Guarnizione_ELD_precamara (T#2S). M190.2 + M51.1 → SET %M63.0 (#A3.0 gasket inflate). DB70.Aux_Command_28 → RESET #A3.1. DEFLATE — M190.3 + DB72.Optional_39 + M51.0 (#E1.0) + M51.1 (#E1.1) + M56.5 (#E6.5) + M53.7 (#E3.7) → RESET %M63.0 (#A3.0). DB70.Aux_Command_28 → SET %M63.1 (#A3.1 gasket deflate). Auto-deflate timer: TON DB100.DBX900.0 Timer_Sgonfiaggio_Automatico_Guarnizione_ELD (T#2S). Output chain: M63.1 + M51.1 → %M66.7 (#A6.7 = YV9174 rapid deflation) AND %M64.0 (#A4.0). FC56 Network 7 (PRE-CAMERA LATERAL SEAL ELD prechamber): M190.0 trigger with Aux_Command_70 → M190.2. M190.1 trigger → M190.3. Both with safety conditions M63.0, M63.1, M51.0. A4.0-A4.7 physically connected to SM 1223 DC/DC module (were missing before). NOTE: W175 interlock still pending — to be added when ITD section work begins.'},{ts:'Mar 28, 08:00 PM',text:'ITD DOOR COMPLETE. All pneumatic logic operational: A6.0 Door OPEN, A6.1 Door CLOSE, A6.2 Gasket INFLATE, A6.3 Gasket DEFLATE, A6.4 Safety Blocking Valve, A6.5 Quick Deflation, A6.7 Venturi Vacuum. Flow restrictors installed (m24). JB replacement done (plc20). A6.2 SET/RESET conflict fixed. A6.3 NO→NC for vacuum. All interlocks W26/W63/W173 cleared. ITD door opens/closes smoothly with pneumatic cylinders.'}],

    {id:'plc16',cat:'PLC',prio:'high',done:true,doneAt:'Mar 28, 08:00 PM',comments:[{ts:'Mar 25, 09:00 AM',text:'Same process as ELD Prechamber section: verify all ITD outputs, program alarms, interlocks, update FC52 (Porte e Guarnizioni), FC56 (Trigger), FC90 (Interlock), FC91 (Allarmi). W175 interlock still pending — must be added when ITD section work begins. ITD is pneumatic (A1301 motor removed). Coordinate with plc3, plc4, plc11, plc12.'},{ts:'Mar 28, 08:00 PM',text:'ITD section COMPLETE. All FC52 Nw6/Nw7 logic operational (door open/close, gasket inflate/deflate, quick deflation, venturi vacuum). FC90 interlocks W26/W63/W173 cleared. JB replacement (plc20) covers FC52, FC54, FC90, FC91, FC4, FC51 changes. A6.2 SET/RESET fixed. A6.3 NO→NC. Interlock reset range extended to bytes 0-21. All downloaded online and verified.'}],

    {id:'plc17',cat:'PLC',prio:'high',done:false,comments:[{ts:'Mar 25, 04:00 PM',text:'PAW270 in N9022 Page 911 is wired (A5151W 2x0.5AWG22 Sh) but missing all logic. Motor already replaced with 120 VAC (e23). VN cable pending change (e22). A3.6 KA9097 contactor pending VN cable (e25).'},{ts:'Mar 25, 07:00 PM',text:'VFD Pre-Chamber already programmed and exhaust physically tested — running OK (p5 done). Now missing all PLC software logic: (1) FC56_Trigger — add triggers for Pre-Chamber Exhaust Fan (start/stop). (2) FC90_Interlock — add Pre-Chamber Exhaust safety interlocks (conditions to permit/block operation). (3) FC91_Allarmi — add Pre-Chamber Exhaust Fan alarms (VFD failure, overcurrent, etc.) in DB91. (4) FC54_Pre-Chamber or equivalent — speed control logic, PAW270 analog output. (5) HMI — add Pre-Chamber Exhaust speed control screen/buttons, status indicators, alarms. (6) Pending VN cables: e22 (FG0511/QF5151) and e25 (A3.6 KA9097).'},{ts:'Mar 26, 08:30 PM',text:'FC54_Pre-Chamber Network 3 (CONTROL FAN START AND STOP): DB70.DBX22.2 (Aux_Command_55_2) + %M54.6 (#E4.6 = tag 91204 Pre-Chamber Start/Stop Ventilation) → %M63.6 (#A3.6 = KA9097 Start Ventilation). E4.6 replaces signal 55101 from JB Prechamber which does not exist in this project. FC90_Interlock Network 21 (WARNING 22 — PRE-CHAMBER VENTILATION START/STOP): DB70.DBX22.2 (Aux_Command_55_2) + %M54.6 (#E4.6) → DB72.DBX0.2 (Optional_03) → DB90.DBX10.0 (Interlock_81) → (S) DB92.DBX2.5 (Interlock_22). Involved blocks: FC54, FC90, DB70, DB72, DB90, DB92.'},{ts:'Mar 26, 09:45 PM',text:'GLOBAL PLC CHANGE: All #E13.6 (%M82.6) references changed to #E4.7 (%M54.7 = N9023 E4.7 = tag 91205 Pre-Chamber Enable Doors Opening). E13.6 DID NOT EXIST as physical input — was phantom address from tag "Pre-chamber - Enable...". Now points to real input in N9023. Cross-reference confirms 4 locations in 2 blocks: FC54 (2 networks) + FC90 (2 networks). (1) FC54 Network 1 (CONTROL FRONT DOOR OPENING / AIRLOCK): %M54.7 (#E4.7) in talled is NOT the correct fan for this application (wrong fan was installed originally). Fan must be mechanically replaced with the correct model. See m23 for mechanical fan replacement task. Software/electrical side is functional — only mechanical fan swap pending.'}],

    {id:'plc18',cat:'PLC',prio:'high',done:false,comments:[{ts:'Mar 25, 06:30 PM',text:'KA9055A/B (80ATS contactor) physically removed from A0.4 in N9020 (Page 905) and relocated to A4.1 in N9023 (Page 913). Cable 91302 AWG18 BU connected to A4.1 DQa → KA9055B → A9055A (80ATS) → YV9131W. In PLC software output still mapped to %Q of N9020 A0.4. Change PLC program assignment from A0.4 (N9020) to A4.1 (N9023).'},{ts:'Mar 25, 07:30 PM',text:'FC54_Pre-Chamber Network 6 (CONTROL - VENTILATION START/STOP) UPDATED: Rung 1: DB70.DBX1.0 (Aux_Command_09) + %M57.1 (#E7.1) + %M57.3 (#E7.3) + %M53.6 (#E3.6) → SET %M64.1 (#A4.1). Branch: DB72.DBX2.1 (Optional_18). TON timer %DB100.DBX920.0 (Timer_Enable_FansVentilation) with DB70.Aux_Command_28 trigger, timer value %DB100.DBD936 (Timer_Enable_FansVentilation_Timer T#5s). Rung 2: DB100.DBX932.2 (Timer_Enable_FansVentilation.Q) → %M60.4 (#A0.4). Main output now in #A4.1 (N9023), timer output maintains #A0.4. DB100_Timer also modified (add to blocks list).'}],

    {id:'plc19',cat:'PLC',prio:'high',done:false,comments:[{ts:'Mar 27, 12:00 AM',text:'LAF VFD speed issue: 100% HMI command = 34.1 Hz instead of 50 Hz on Invertek E3-1PH drives. After verifying FC2 InOut Network 4 scaling formula is CORRECT (REAL_TO_UINT(ObjPid.ID[x].Output * 27648.0 / 100.0) = 27648 = 10V at 100%), the issue is now suspected to be VFD parameter misprogramming — NOT PLC software. Check on all 3 VFDs (A1511 LAF 1, A1512 LAF 2, A1513 LAF 3): (1) P-01 Maximum Frequency — should be 50.0 Hz (may be set lower). (2) P-02 Minimum Frequency. (3) P-07 or P-35 Analog Input scaling — verify 0-10V = 0-50 Hz full range. (4) If P-01 is already 50 Hz, then check if analog input high reference is capped (e.g., P-35 Analog Input Max Freq might be 34.1 Hz). Use OptiTools or VFD keypad to read/modify. If VFD params are correct, THEN investigate PLC side: monitor ObjPid.ID[4].Output at HMI 100% to see actual value reaching FC2. CRITICAL not urgent — LAFs run at reduced speed.'},{ts:'Mar 27, 01:30 AM',text:'OptiTools Studio parameters READ from all 4 drives via OptiStick Smart (Bluetooth LE). Drive FW V3.12. Drives connected: 01=A1501, 02=A1512 LAF 2, 03=A1513 LAF 3, 04=A1511 LAF 1. LAF motor nameplate: ebm D2E146-AP47-02, 230V~50/60Hz, 1.31/1.45A, 300/330W, 2050/2550rpm, 8µF 400VDB, Iso-B, Made in Germany (09/02). BASIC PARAMETERS (same on all LAF drives): P-01=2050rpm (Max Speed = 50Hz — CORRECT), P-02=1435rpm (Min Speed = ~35Hz), P-03=15s (Accel Ramp), P-04=15s (Decel Ramp), P-05=2 Ramp to Stop (Fast Stop), P-07=230V, P-08=1.7A (NOTE: nameplate says 1.31A@50Hz — should correct to 1.31A), P-09=50Hz (Motor Rated Freq — CORRECT), P-10=2050rpm (Motor Rated Speed — CORRECT), P-11=3% (Boost Start), P-12=0 Terminal Mode, P-14=101 (Extended Access). ANALYSIS: P-01=2050rpm=50Hz is CORRECT. VFD Basic params are NOT the cause. At HMI 100%, VFD shows ~41 Hz (not 50 Hz). 41/50 = 82% → VFD only receiving ~8.2V instead of 10V. ROOT CAUSE LIKELY IN PLC: ObjPid.ID[4].Output is capped at ~82% — HMI displays setpoint (100%) but actual PID output is limited. DEBUG STEPS: (1) Check Extended tab in OptiTools for P-36/P-37 AI scaling params — verify AI1 High Reference = P-01. (2) Measure voltage at VFD AI terminals (UI/GND on N9032) with multimeter at HMI 100%. (3) If voltage ~8.2V → PLC issue: check ObjPid.ID[4] Output High Limit in DB — change to 100.0. (4) If voltage = 10V → VFD Extended param issue. ALSO: P-08 should be corrected from 1.7A to 1.31A per motor nameplate.'},{ts:'Mar 27, 02:00 AM',text:'MULTIMETER TEST RESULT: Measured at N9032 AO terminals (channels 6 and 7). At HMI 0% → 0V. At HMI 100% → 9.96 VDC. PLC analog output is CORRECT — full 10V reaching the VFD. ROOT CAUSE CONFIRMED: VFD Extended parameters are limiting the analog input range. PLC and ObjPid are NOT the issue. FIX: Open OptiTools Extended tab and check: (1) P-15 AI1 Configuration — must be 0: 0-10V. (2) P-36 AI1 Minimum Reference — should be 0 rpm. (3) P-37 AI1 Maximum Reference — should be 2050 rpm (= P-01). If P-37 is set lower than 2050, that is the cause — 10V maps to a speed lower than max. Set P-37 = 2050 rpm on all 3 LAF drives and retest.'},{ts:'Mar 27, 02:30 AM',text:'SECOND MULTIMETER TEST — DEFINITIVE: At VFD analog input terminals with HMI at 100%, multimeter reads 9.97 VDC. VFD display shows 34.1 Hz. This PROVES: (1) PLC analog output is 100% correct — 9.97V ≈ 10V full scale. (2) VFD is mapping 10V → 34.1 Hz instead of 50 Hz. (3) 34.1/50 = 68.2% — the VFD Extended parameter P-37 (AI1 Maximum Reference) is set to approximately 1398 rpm instead of 2050 rpm. FIX REQUIRED: In OptiTools Extended tab → P-37 AI1 Maximum Reference = 2050 rpm, P-36 AI1 Minimum Reference = 0 rpm. Apply to all 3 LAF drives (A1511, A1512, A1513). Write to drives and verify 10V = 50 Hz on VFD display.'},{ts:'Mar 27, 03:00 AM',text:'ROOT CAUSE FOUND AND RESOLVED. Extended params (P-16=0-10V, P-35=100%, P-39=0%) were all correct — P-36 is Drive Address and P-37 is Extended Menu Access Code (NOT AI scaling as initially suspected). ACTUAL ROOT CAUSE: Invertek E3-1PH RPM mode conversion. When P-10 (Motor Rated Speed) has a value (e.g., 2050 rpm), the VFD operates in RPM mode and converts RPM→Hz using internal pole calculation: f = N × P / 120. With P-10=2050rpm, VFD derives 2-pole motor (nearest sync speed above 2050 = 3000rpm), so f = 2050×2/120 = 34.17 Hz — exactly matching the 34.1 Hz on display. The ebm D2E146-AP47-02 is an EXTERNAL ROTOR motor with non-standard pole/speed characteristics — the standard induction motor pole formula does NOT apply. FIX: Set P-10 = 0 rpm → VFD switches to Hz mode. P-01 then displays in Hz (not RPM). VERIFIED: with P-10=0, P-01=50.0Hz → VFD correctly outputs 50 Hz at 10V input (HMI 100%). FINAL PARAMETERS for all 3 LAF drives (A1511, A1512, A1513): P-01=50.0Hz, P-02=0.0Hz, P-09=50Hz, P-10=0rpm (Hz mode), P-08=1.31A (per D2E146 nameplate @50Hz). PLC output confirmed correct: 0%=0V, 100%=9.97V. Issue RESOLVED.'},{ts:'Mar 27, 03:30 AM',text:'FINAL CONFIGURATION APPLIED to all 3 LAF drives. P-02 set to 35.0 Hz (minimum frequency for LAF operation — matches original Comecer intent of 1435rpm = 70% of max, protects motor from low-speed overheating and maintains laminar airflow minimum). FINAL PARAMS WRITTEN: P-01=50.0Hz (max), P-02=35.0Hz (min — 70% of max, LAF laminar flow minimum), P-08=1.31A (motor nameplate D2E146 @50Hz), P-09=50Hz, P-10=0rpm (Hz mode). All 3 drives (A1511 LAF 1, A1512 LAF 2, A1513 LAF 3) updated via OptiTools Studio + OptiStick Smart Bluetooth. VFD parameter document updated to reflect new Hz mode values.'}],
     title:'LAF VFD speed limit — RESOLVED: E3-1PH RPM→Hz conversion issue, switched to Hz mode',
     done:true,doneAt:'Mar 27, 03:30 AM',
     hint:'DONE. Root cause: VFD RPM mode (P-10≠0) uses pole formula f=N×2/120=34.1Hz. Fix: P-10=0 (Hz mode). Final: P-01=50Hz, P-02=35Hz (LAF min), P-08=1.31A, P-09=50Hz. 10V=50Hz confirmed. Applied to all 3 LAF drives.'},
    {id:'plc20',cat:'PLC',prio:'high',done:false,comments:[{ts:'Mar 27, 09:00 AM',text:'E12.4 (#M81.4) and E12.5 (#M81.5) were from a JB (Junction Box) that does NOT exist in this project. Original design used two sensors to detect tray position left/right, but this machine only has ONE sensor on E6.6 for tray home position. Replaced E12.4/E12.5 with E6.6 across multiple FCs. CHANGES DONE: (1) FC52 Nw6 Flag04 HC R→L: E12.4+E12.5 REPLACED by E6.6. (2) FC52 Nw6 Flag01 HC L→R: E12.4+E12.5 REPLACED by E6.6. (3) FC54 Nw7 Aux_HMI_38: E6.6 added IN PARALLEL (E12.4/E12.5 kept temporarily). (4) FC90 Nw8 Interlock W26 (tray not in position): E6.6 added — W26 NOW CLEARED. REMAINING: FC91 Nw40 A049 alarm still references E12.4/E12.5 — needs update to E6.6. Also ChamberCommunication may reference E12.4. W63 interlock still active — ITD door vs prechamber door closed condition.'},{ts:'Mar 27, 09:30 AM',text:'W63 fix in FC90 Nw8: Added real inputs in parallel to non-existent JB signals. (5) E12.1 (#M81.1) → added E1.1 (#M51.1) in parallel — door closed signal from real sensor. (6) E13.0 (#M82.0) → added E1.0 (#M51.0) in parallel — gasket inflated pressure sensor (real signal). Both E1.0 and E1.1 are real inputs on the existing I/O module. E12.1/E13.0 from non-existent JB kept in parallel for now.'},{ts:'Mar 27, 09:45 AM',text:'(7) FC90 Nw8 Flag01 (HC LEFT→HC RIGHT): Added E1.1 (#M51.1, door closed) AND E1.0 (#M51.0, gasket inflated) as conditions on the Flag01 rung. Ensures HC handshake LEFT→RIGHT only happens when door is confirmed closed AND gasket is inflated — using real pressure sensor signals. Both conditions required before tray can move from left to right hot cell.'},{ts:'Mar 27, 10:30 AM',text:'Continued cross-reference sweep of E12.1 across all FCs. Additional changes: (8) FC52 Nw6 — Flag03/A6.0 output rung: E1.1 in parallel with E12.1, E1.0 in parallel with E13.0. (9) FC52 Nw6 — HC handshake rungs (Flag01/Flag06): E1.1 in parallel with E12.1, E1.0 in parallel with E13.0. (10) FC52 gasket ITD section — Flag06/SET-RESET rung: E1.1 added in parallel with E12.1 in the Optional_24+Optional_29 condition branch. (11) FC54 Nw2 INFLAR/DESINFLAR EL SELLADO FRONTAL — deflate/inflate rung: E1.1 added in parallel with E12.1 in the M151.5 condition path (RESET A12.2 / SET A12.3). (12) ChamberCommunication02 FC4 — Flag01/Flag03 rung: E1.1+E1.0 added in parallel with E12.1+E13.0. (13) FC51 Main Cycle Nw9 CONSENTIMIENTO: E1.1 added in parallel with E12.1. Cross-reference sweep of E12.1 now covers: FC4 ✓, FC51 ✓, FC52 Nw6 ✓ (x5), FC52 Nw7 ✓, FC54 Nw2 ✓. Remaining from cross-ref: FC54 Nw5, FC54 Nw6 (x2), FC90 Nw20, FC90 Nw22.'},{ts:'Mar 28, 10:00 AM',text:'(14) FC54 Nw5 CONSENSO PUERTAS PREVIAS A LA CÁMARA CERRADAS: E1.0+E1.1 added in parallel with E12.1+E12.2+E13.0 rung → A13.1. Door consensus for pre-chamber now evaluates with real sensors. (15) FC54 Nw6 DESCARGA BANDEJA — upper rung (M152.0 path): E1.1 in parallel with E12.1. Controls SET A12.6/RESET A12.4/SET A12.5 with A076 alarm check. (16) FC54 Nw6 DESCARGA BANDEJA — lower rung (M152.1 path): E1.1 in parallel with E12.1. Controls SET A12.7/SET A12.5/RESET A12.6. Remaining: FC90 Nw20, FC90 Nw22, FC91 Nw40.'},{ts:'Mar 28, 11:00 AM',text:'(17) FC90 Nw20 ADVERTENCIA 21 INFLAR/DESINFLAR SELLO FRONTAL PRE-CÁMARA: E1.1 in parallel with E12.1 in Interlock_77 rung. (18) FC90 Nw1 ADVERTENCIAS DE REINICIO — interlock reset range fix: Added MOVEs 16#0000 to DB90.DBW10 thru DBW20 (6 new) AND DB92.DBW10 thru DBW20 (6 new, includes Interlock_W01-W05). Original reset only covered bytes 0-9 in both DBs. Interlock_173 at DB92.DBX11.0 and Interlock_176 at DB90.DBX21.7 were never being reset. Now full range DB90 bytes 0-21 and DB92 bytes 0-21 are cleared on HMI reset command (Aux_Command_19). Verified on HMI: W173 now clears correctly. Remaining cross-ref: FC90 Nw22, FC91 Nw40.'},{ts:'Mar 28, 12:30 PM',text:'NEW ISSUE FOUND: In FC54 Nw2 (INFLAR/DESINFLAR EL SELLADO FRONTAL), the output A12.2 (M71.2) needs to be changed to the lateral door prechamber output instead. Search for #A6.2 shows it is used in FC54 Nw2(x2), FC52 Nw7(x2), FC91 Nw24(x2), FC90 Nw20, FC90 Nw19. Pending: determine correct output address for lateral door prechamber and apply change.'},{ts:'Mar 28, 01:00 PM',text:'(19) FC52 Nw6 A6.2 SET/RESET conflict fix: The rung with M160.1+E0.2+M165.0+E3.7 was RESETting A6.2 (gasket inflate) at the same time the timer was SETting it. Root cause: no second chamber PLC connected, so handshake conditions had no valid context. Fix: Added OR with NC condition to disable the RESET rung (practically bypassed without deleting code — can be re-enabled when second PLC is connected). Also changed A6.3 from NO to NC in Nw7 for vacuum system operation. (20) Downloaded all changes to PLC online. Verified FC52 Nw6 online: all E1.1/E1.0 parallel paths active (green), E6.6 active, Flag01/Flag03/Flag04/Flag06 handshake signals all functional with real sensors. REMAINING: FC90 Nw22, FC91 Nw40.'}],
     title:'Replace non-existent JB inputs (E12.x/E13.x) with real sensors — FC52, FC54, FC90, FC91',

     hint:'DONE. JB not installed. E12.4+E12.5→E6.6, E12.1→E1.1, E13.0→E1.0. ALL BLOCKS UPDATED: FC4, FC51, FC52(Nw6x5,Nw7), FC54(Nw2,Nw5,Nw6x2), FC90(Nw1,Nw8,Nw20), ChamberComm. Reset range DB90/DB92 0-21. A6.2 SET/RESET fixed. A6.3 NO→NC. W26/W63/W173 cleared. Minor remaining: FC90 Nw22, FC91 Nw40.'},
    {id:'plc21',cat:'PLC',prio:'medium',done:false,comments:[{ts:'Mar 28, 02:00 PM',text:'Vacuum system venturi valve auto-shutoff needed. When gaskets are open (deflated), outputs A6.5 (Quick Deflation YV9173) and A6.7 (Rapid Deflation Vacuum YV9174) remain ON indefinitely — venturi valve keeps running. This causes continuous venturi valve noise and a slight pressure drop in the system (minimal impact but not ideal). FIX: Add TON timer in FC52 Nw7 to auto-disable A6.5 and A6.7 after a configurable time (e.g., T#10s–T#30s) once gasket deflation is complete. Timer should start when gaskets reach fully deflated state (no pressure on E1.0) and reset when gasket inflate cycle begins. Timer value stored in DB100 for HMI adjustment. Low priority — system functional without it.'}],
     title:'Vacuum system venturi valve auto-shutoff timer — FC52 Nw7, A6.5/A6.7 TON timer',
     hint:'A6.5 (Quick Deflation) and A6.7 (Venturi Vacuum) stay ON when gaskets are open — venturi valve runs continuously causing noise and slight pressure drop. Add TON timer in FC52 Nw7 to auto-disable after X seconds. Timer in DB100 for HMI config.'},
    {id:'plc22',cat:'PLC',prio:'high',done:true,doneAt:'Mar 28, 08:30 PM',comments:[{ts:'Mar 28, 02:30 PM',text:'A076 ROOM COMMUNICATION ALARM root cause analysis: FC91 Nw44 monitors two WatchDog values in DB904 (HC Signal Exchange). Rung 1: Optional_03+Optional_29(NO) checks DB904.DBW0 (HC RIGHT→LEFT WatchDog). Rung 2: Optional_29(NC) checks DB904.DBW38 (HC LEFT→RIGHT WatchDog). If WatchDog == OldWatchDog (MW4) for 5 seconds (TON DB101.DBX1160.0, T#5s) → SET DB91.Alarme_76. In OB1 Nw18: FC3 uses Optional_03+Optional_29(NC), FC4 uses Optional_29(NO). With Optional_29=ON: FC3 does NOT run (NC open) but Rung 1 alarm IS enabled (NO closed) → monitors WatchDog that never updates → A076 triggers. ROOT CAUSE: Optional_29 contact polarity mismatch between FC91 Nw44 and OB1 Nw18 — Comecer original programming error.'},{ts:'Mar 28, 03:30 PM',text:'Tested fix: Changed Rung 1 Optional_29 from NO to NC. A076 cleared. Initially reverted to original code, but alarm kept coming back.'},{ts:'Mar 28, 08:30 PM',text:'FIX APPLIED PERMANENTLY: A076 no longer appears on HMI. Alarm cleared. Active alarms remaining: A107, A108 only.'}],
     title:'A076 Room Communication Alarm — FIXED, alarm cleared',
     done:true,doneAt:'Mar 28, 08:30 PM',
     hint:'DONE. Root cause: FC91 Nw44 Optional_29 polarity mismatch vs OB1 Nw18. Fix applied. A076 cleared from HMI.'},
    {id:'plc23',cat:'PLC',prio:'high',done:false,comments:[{ts:'Mar 28, 09:30 PM',text:'ELD Prechamber front door interlock logic needs tag replacement. Current code uses original Comecer tags for the front door (shielded door) but the prechamber ELD has its own door with different physical I/O. Need to cross-reference all interlock conditions in FC90 (W173, W174, W175, W176, W177 and related), FC52 (gasket inflate/deflate logic), FC54 (pre-chamber door control), and FC91 (alarms) — replace shielded front door tags with ELD prechamber front door tags. Essentially a tag swap across all relevant interlocks to ensure the ELD section references its own door sensors and outputs, not the main chamber front door. Similar scope to plc20 JB replacement but for ELD door tags.'}],
     title:'ELD Prechamber front door interlocks — replace tags (door/gasket I/O) across FC52, FC54, FC90, FC91',
     hint:'Change all interlock tags from main front door to ELD prechamber front door. Cross-reference and replace door closed, gasket inflated/deflated sensor tags and output tags in all relevant FCs. Tag swap — no logic change needed.'},
    {id:'plc24',cat:'PLC',prio:'high',done:false,comments:[{ts:'Apr 01, 03:00 PM',text:'Front door shield deflate interlock needed. PROBLEM: Currently the front gasket can be deflated even when the shield door is closed. This is unsafe — if the gasket deflates while the shield door is closed, the operator cannot access the plexiglass (there is no plexiglass sensor — E12.2 is bypassed). REQUIREMENT: If shield door is CLOSED (E1.1 = 1 / M51.1 = 1) AND front gasket is INFLATED (E1.0 = 1 / M51.0 = 1), the deflate command must be BLOCKED. Deflation should only be allowed when shield door is OPEN (E1.1 = 0 / M51.1 = 0), because opening the door implies the operator has removed the plexiglass. IMPLEMENTATION: Add interlock condition in FC52 Nw13 (ELD precamara inflate/deflate logic) or FC54 Nw2 — the deflate SET rung for M63.1 (#A3.1) must include M51.1 as NC (door must be open to deflate). This replaces the missing plexiglass sensor interlock with a door-open requirement.'}],
     title:'Front door shield deflate interlock — block deflate when shield door closed (no plexiglass sensor)',
     hint:'Safety interlock: if shield door CLOSED + gasket INFLATED → cannot deflate. Deflate only allowed when shield door OPEN (assumes plexiglass removed). Add M51.1 NC condition to deflate rung in FC52 Nw13 or FC54 Nw2.'},
    {id:'plc25',cat:'PLC',prio:'medium',done:false,comments:[{ts:'Apr 02, 10:00 PM',text:'HMI label corrections needed on-site when Julian returns. A1512: change label 15207 → 16207, change label 15308 → 17208. A1513: change label 15307 → 17307, change label 15308 → 17208. Also update labels for M1511W, M1512W, M1513W. These are HMI text/label updates only — no PLC logic change. Must be done on-site with TIA Portal HMI editor connected to TP700.'}],

    {id:'e30',cat:'ELECTRICAL',prio:'medium',done:true,doneAt:'Apr 07, 2026',comments:[{ts:'Apr 02, 10:30 PM',text:'On-site cable verification needed for E4.6 and E4.7 (N9023). E4.6: Schematic page shows cable 55101 but real cable is 91204 (Pre-Chamber Start/Stop Ventilation). Already corrected in drawing — need to physically verify the cable label on-site matches 91204. E4.7: Real cable is 91205 (Pre-Chamber Enable Doors Opening). Drawing already corrected — need to physically verify cable label on-site, may still have old label 55102.'},{ts:'Apr 07, 2026',text:'DONE. Orange jumper wire installed on terminal block for E4.6 and E4.7. Both inputs verified working. If customer wants to remove the bypass later, they can remove the orange jumper and connect their own enable signal.'}],

     hint:'DONE. Orange jumper installed on terminal block. Customer can remove jumper and connect their own enable signal if needed.'},
    {id:'e31',cat:'ELECTRICAL',prio:'medium',done:true,doneAt:'Apr 07, 2026',comments:[{ts:'Apr 02, 11:00 PM',text:'On-site verification: Input E6.0 cable 13007 is currently fed from 24L01 but should be on 24L03. Check wiring at terminal and move cable 13007 to correct 24V rail 24L03.'},{ts:'Apr 07, 2026',text:'DONE. E6.0 and E6.7 both connected to 24V rail 24L03. In this application the ITD door motor is PNEUMATIC (not electric) — no VFD installed, so E6.0 (Inverter Ready) and E6.7 (KM1301 Brake) are not needed from VFD. Connected to 24L03 to keep inputs permanently HIGH (satisfied). If customer later installs an electric motor, remove the 24L03 jumper and connect the VFD ready/brake signals.'}],

     hint:'DONE. E6.0 (Inverter Ready) + E6.7 (Brake) jumpered to 24L03. Pneumatic motor — no VFD. Remove jumper if electric motor installed later.'},
    {id:'e32',cat:'ELECTRICAL',prio:'medium',done:true,doneAt:'Apr 07, 2026',comments:[{ts:'Apr 02, 11:15 PM',text:'On-site verification: N9028 Digital Output Module (Page 925). Review output A10.1 — cable 92502 AWG18 BU to YV9252 (Quick Deflation valve) via KA9251 contactor. Verify wiring, contactor operation, and valve function. Also review A10.0 (cable 92301, Particle Counter Enable via XC161).'},{ts:'Apr 07, 2026',text:'DONE. A10.1 output replaced by A6.7 — this is the DEFLATABLE GASKETS RAPID VACUUM SYSTEM output. The original A10.1 (YV9252 Quick Deflation via KA9251) function is now handled through A6.7. Verified working.'}],

     hint:'DONE. A10.1 replaced by A6.7 (Deflatable Gaskets Rapid Vacuum System). Verified working.'},
    {id:'e34',cat:'ELECTRICAL',prio:'medium',done:true,doneAt:'Apr 07, 2026',comments:[{ts:'Apr 07, 2026',text:'E3.6 (cable 19601 AWG18 BU) = CONSENSO DA CLIENTE MARCIA/ARRESTO VENTILAZIONE — Enable From Customer Start/Stop Ventilation. E3.7 (cable 19602 AWG18 BU) = CONSENSO DA CLIENTE APERTURA PORTA — Enable From Customer Door Opening. Orange jumper wire installed on each input to keep them permanently HIGH (24V). These are customer enable signals — if the customer wants to control ventilation start/stop or door opening from their system, they remove the orange jumper and connect their own enable signal.'}],

    {id:'e33',cat:'ELECTRICAL',prio:'medium',done:true,doneAt:'Apr 07, 2026',comments:[{ts:'Apr 02, 11:30 PM',text:'On-site double verification of PAW270 analog output on N9022 (Page 911). PAW270 channels 1M and 1 drive Speed Reference Pre-Chamber Air Extraction Fan via cable A5151W (2x2xAWG22 Sh, 3m). Analog signals: 0-10V cable 91104 (channel 1M) and 0-10V cable 91103 (channel 1). Shields SH9111/SH9112 → 046.2.'},{ts:'Apr 07, 2026',text:'CONFIRMED: PAW270 1M and 1 verified against schematic Page 911. Channel assignment and cable numbers match. Speed reference working correctly.'}],
     title:'Verify PAW270 (Pre-Chamber Extraction) and PAW268 (Main Extraction) channel/cable numbers — N9022 Page 911',
     hint:'DONE. PAW270 1M/1 confirmed matching schematic. Speed reference working.'},
    {id:'e35',cat:'ELECTRICAL',prio:'high',done:false,comments:[{ts:'Apr 09, 2026',text:'Connect ITD door motor to VFD (A1301 / KM1301 per schematic Page 917). Test door operation: verify door goes UP and DOWN in correct direction. If rotation is wrong, swap L1/L2/L3 motor cables at VFD output. After direction confirmed: remove E6.0 and E6.7 jumpers from 24L03 (see e31) and connect actual VFD Ready and Brake Release signals. Note: e31 previously had these jumpered because motor was pneumatic — now switching to electric motor with VFD.'}],
     title:'Connect ITD door motor to VFD A1301 — test direction, swap L1/L2/L3 if needed',
     hint:'Connect motor, test up/down direction. If wrong direction swap L1/L2/L3 at VFD output. Then reconnect E6.0 (Inverter Ready) and E6.7 (Brake Release) from VFD instead of 24L03 jumper.'},
    {id:'e36',cat:'ELECTRICAL',prio:'high',done:false,comments:[{ts:'Apr 09, 2026',text:'Front door shield motor not yet connected to VFD A1201. VFD already programmed (a01 done). Steps: 1) Connect motor power cables to A1201 output. 2) Test door operation — verify door goes UP and DOWN in correct direction from HMI. 3) If rotation is wrong, swap any two of L1/L2/L3 motor cables at VFD output to reverse direction. 4) Verify E0.0 (inverter ready from A1201) goes ON after connection. 5) Verify E2.0 (N9021 ready signal from A1201) also reads correctly. Related: m27 for mechanical sensor verification.'}],
     title:'Connect front door shield motor to VFD A1201 — test direction, swap L1/L2/L3 if wrong',
     hint:'VFD A1201 already programmed. Connect motor, test UP/DOWN direction from HMI. If wrong rotation swap L1/L2/L3 at VFD output. Verify E0.0 and E2.0 inverter ready signals after connection.'},

    {id:'m27',cat:'MECHANICAL',prio:'high',done:false,comments:[{ts:'Apr 09, 2026',text:'Main door shield (front door) — verify sensor positions and mechanical system. Check N9020 DI: E0.0 (inverter portello/door ready), E0.1 (door open limit switch SQ9011), E0.2 (door close limit switch SQ9012), E0.3 (plexiglass presence BF9013), E0.4 (door in position OK), E0.5 (gasket pressure switch SP9011). Check N9020 DO: A0.0 (open door command), A0.1 (close door command), A0.2 (inflate gasket), A0.3 (deflate gasket). N9021 DI: E2.0 (ready shielded front door inverter A1201). Grease all moving parts (rails, rollers, brake mechanism) — recommended but outside commissioning scope. Coordinate with Comecer mechanical team.'},{ts:'Apr 09, 2026',text:'Verify all limit switches (SQ9011 open, SQ9012 close) are in correct mechanical position and activate at the right door travel points. Check plexiglass presence sensor BF9013 alignment. Check gasket pressure switch SP9011. Recommendation: grease rails, rollers, and brake mechanism for smooth operation — but this is outside commissioning scope, coordinate with Comecer mechanical team or client maintenance.'}],

// ─────────────────────────────────────────────────────────────
// PURGE OLD VERSIONS — clean up stale localStorage keys on boot
// ─────────────────────────────────────────────────────────────
(function purgeOldKeys() {
  try {
    var keysToRemove = [];
    for (var k = 0; k < localStorage.length; k++) {
      var key = localStorage.key(k);
      if (key && key.indexOf('comecer-v0653-') === 0 && key !== LS_KEY) {
        keysToRemove.push(key);
      }
    }
    for (var r = 0; r < keysToRemove.length; r++) {
      localStorage.removeItem(keysToRemove[r]);
    }
  } catch(e) {}
})();

// ─────────────────────────────────────────────────────────────
// STORAGE  — localStorage primary, shared storage secondary
// Tasks are always rendered immediately from defaults/localStorage
// ─────────────────────────────────────────────────────────────
function loadFromLS() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (raw) { tasks = JSON.parse(raw); return true; }
  } catch(e) {}
  return false;
}

function saveToLS() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(tasks)); } catch(e) {}
}

async function saveToShared() {
  try {
    if (typeof window.storage !== 'undefined') {
      await window.storage.set(LS_KEY, JSON.stringify(tasks), true);
    }
  } catch(e) {}
}

async function loadFromShared() {
  try {
    if (typeof window.storage !== 'undefined') {
      var r = await window.storage.get(LS_KEY, true);
      if (r && r.value) {
        var parsed = JSON.parse(r.value);
        if (parsed && parsed.length) {
          tasks = parsed;
          saveToLS();
          return true;
        }
      }
    }
  } catch(e) {}
  return false;
}

async function persist() {
  saveToLS();
  await saveToShared();
}

// Boot: render immediately, then try to sync from shared
function boot() {
  var loaded = loadFromLS();
  if (!loaded) {
    tasks = getDefaults();
    saveToLS();
  }
  renderAll();
  // Background sync from shared storage
  loadFromShared().then(function(got) {
    if (got) renderAll();
  });
}

// Background refresh every 20s
setInterval(function() {
  loadFromShared().then(function(got) { if (got) renderAll(); });
}, 20000);

function openPin() {
  document.getElementById('pinField').value = '';
  document.getElementById('pinError').textContent = '';
  document.getElementById('pinPopup').classList.add('open');
  setTimeout(function(){ document.getElementById('pinField').focus(); }, 80);
}
function closePin() { document.getElementById('pinPopup').classList.remove('open'); }
function pinPopupBg(e) { if (e.target.id === 'pinPopup') closePin(); }

function tryUnlock() {
  var entered = document.getElementById('pinField').value;
  if (entered === PIN) {
    isEditor = true;
    closePin();
    document.body.classList.remove('view-mode');
    updateLockBtn();
    showToast('Editor mode active');
  } else {
    document.getElementById('pinError').textContent = 'Incorrect — try again';
    document.getElementById('pinField').value = '';
    document.getElementById('pinField').focus();
  }
}
function lockEditor() {
  isEditor = false;
  document.body.classList.add('view-mode');
  updateLockBtn();
}
function lockBtnClick() {
  if (isEditor) {
    lockEditor();
  } else {
    openPin();
  }
}

  var btn = document.getElementById('lockBtn');
  btn.textContent = isEditor ? '🔓' : '🔒';

// STATS
// ─────────────────────────────────────────────────────────────
function renderStats() {
  var td = 0, ta = 0;
  var cats = Object.keys(CAT_META);
  for (var i = 0; i < cats.length; i++) {
    var catKey = cats[i];
    var m = CAT_META[catKey];
    var ct = tasks.filter(function(t){ return t.cat === catKey; });
    var done = ct.filter(function(t){ return t.done; }).length;
    document.getElementById('stat-' + m.sid).innerHTML = done + ' <span>/ ' + ct.length + '</span>';
    document.getElementById('fill-' + m.sid).style.width = (ct.length ? Math.round(done/ct.length*100) : 0) + '%';
    td += done; ta += ct.length;
  }
  var op = ta ? Math.round(td/ta*100) : 0;
  document.getElementById('overallFill').style.width = op + '%';
  document.getElementById('overallPct').textContent = op + '%';
}

    var catKey = cats[ci];
    var meta = CAT_META[catKey];

    if (currentCatFilter && currentCatFilter !== catKey) continue;

    var prioOrder = {high:0, med:1, low:2};
    var list = tasks.filter(function(t) {
      if (t.cat !== catKey) return false;
      if (currentFilter === 'done' && !t.done) return false;
      if (currentFilter === 'pending' && t.done) return false;
      if (currentMachFilter && (t.mach || 'MIP') !== currentMachFilter) return false;
      if (search) {
        var s = search;
        var code = (t.code || t.id || '').toLowerCase();
        var machStr = (t.mach || 'MIP').toLowerCase();
        if (!t.title.toLowerCase().includes(s) &&
            !code.includes(s) &&
            !machStr.includes(s) &&
            !(t.hint||'').toLowerCase().includes(s)) return false;
      }
      return true;
    }).sort(function(a, b) {
      // Done tasks always go to bottom
      if (a.done !== b.done) return a.done ? 1 : -1;
      // Then sort by priority
      return (prioOrder[a.prio]||1) - (prioOrder[b.prio]||1);
    });

    if (!list.length) continue;
    any = true;

    var done = list.filter(function(t){ return t.done; }).length;

    var g = document.createElement('div');
    g.className = 'category-group';
    g.innerHTML =
      '<div class="cat-header">' +
        '<div class="cat-dot" style="background:' + meta.color + '"></div>' +
        '<div class="cat-name" style="color:' + meta.color + '">' + meta.icon + ' ' + catKey + '</div>' +
        '<div class="cat-count">' + done + '/' + list.length + ' done</div>' +
      '</div>' +
      '<div id="gl-' + catKey + '"></div>';
    el.appendChild(g);

    var lc = document.getElementById('gl-' + catKey);
    // Use IIFE to capture catKey and meta per iteration
    (function(ck, cm, lst) {
      for (var ti = 0; ti < lst.length; ti++) {
        lc.appendChild(buildCard(lst[ti], ck, cm));
      }
    })(catKey, meta, list);
  }

  if (!any) el.innerHTML = '<div class="empty-state">No tasks match the current filter.</div>';
}

// ─────────────────────────────────────────────────────────────
// BUILD CARD
// ─────────────────────────────────────────────────────────────
function buildCard(t, catKey, meta) {
  var card = document.createElement('div');
  card.className = 'task-card' + (t.done ? ' done' : '');
  card.id = 'card-' + t.id;

  var pc = t.prio === 'high' ? 'prio-high' : t.prio === 'low' ? 'prio-low' : 'prio-med';
  var pl = t.prio === 'high' ? 'HIGH' : t.prio === 'low' ? 'LOW' : 'MED';
  var typeLabel = t.type === 'hw' ? 'HW / Wiring' : t.type === 'sw' ? 'SW / Config' : t.type === 'hw-sw' ? 'HW + SW' : '';

  var comments = (t.comments || []).map(function(c) {
    return '<div class="comment-entry"><span class="comment-ts">' + xe(c.ts) + '</span><span>' + xe(c.text) + '</span></div>';
  }).join('');

  var doneStamp = (t.done && t.doneAt)
    ? '<span style="font-size:9px;color:var(--text-dim);font-family:\'Space Mono\',monospace">✓ ' + xe(t.doneAt) + '</span>'
    : '';

  var tid = t.id;
  card.innerHTML =
    '<div class="task-main" onclick="cardClick(\'' + tid + '\')">' +
      '<div class="task-checkbox">' +
        '<svg width="11" height="11" viewBox="0 0 12 12" fill="none">' +
          '<polyline points="1.5,6 4.5,9 10.5,3" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>' +
      '</div>' +
      '<div class="task-body">' +
        '<div class="alarm-code-lbl">' + xe(t.code || t.id).toUpperCase() + '</div>' +
        '<div class="task-title">' + xe(t.title) + '</div>' +
        (t.hint ? '<div class="task-hint">💡 ' + xe(t.hint) + '</div>' : '') +
        '<div class="task-meta">' +
          '<span class="mach-tag mach-' + (t.mach||'MIP') + '">' + (t.mach||'MIP') + '</span>' +
          '<span class="task-cat-tag" style="color:' + meta.color + ';border-color:' + meta.color + ';background:' + meta.dim + '">' + xe(catKey) + '</span>' +
          '<span class="task-priority ' + pc + '">' + pl + '</span>' +
          (typeLabel ? '<span class="alarm-type-tag ' + (t.type||'') + '">' + typeLabel + '</span>' : '') +
          doneStamp +
        '</div>' +
      '</div>' +
      '<div class="task-actions" onclick="event.stopPropagation()">' +
        '<button class="icon-btn" onclick="togCP(\'' + tid + '\')" title="Notes">' +
          '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>' +
          ((t.comments||[]).length ? '<span style="font-size:9px;color:var(--amber);margin-left:1px">' + (t.comments||[]).length + '</span>' : '') +
        '</button>' +
        '<button class="icon-btn del edit-only" onclick="delTask(\'' + tid + '\')" title="Delete">' +
          '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>' +
        '</button>' +
      '</div>' +
    '</div>' +
    '<div class="comment-panel" id="cp-' + tid + '">' +
      '<div class="comment-label">Notes & Updates</div>' +
      '<div class="comment-history" id="ch-' + tid + '">' + comments + '</div>' +
      '<div class="comment-row edit-only">' +
        '<textarea class="comment-input" id="ci-' + tid + '" placeholder="Add note or update…" rows="1" onkeydown="ckd(event,\'' + tid + '\')"></textarea>' +
        '<button class="comment-save" onclick="addComment(\'' + tid + '\')">Save</button>' +
      '</div>' +
    '</div>';

  return card;
}

// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
function xe(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────
async function cardClick(id) {
  if (!isEditor) return;
  var t = null;
  for (var i=0;i<tasks.length;i++) { if (tasks[i].id===id){ t=tasks[i]; break; } }
  if (!t) return;
  t.done = !t.done;
  t.doneAt = t.done
    ? new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
    : null;
  await persist(); renderAll();
  if (t.done) showToast('✓ Task marked complete');
}

function togCP(id) {
  var p = document.getElementById('cp-' + id); if (!p) return;
  p.classList.toggle('open');
  if (p.classList.contains('open') && isEditor) {
    var inp = document.getElementById('ci-' + id);
    if (inp) setTimeout(function(){ inp.focus(); }, 50);
  }
}

function ckd(e, id) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addComment(id); }
}

async function addComment(id) {
  if (!isEditor) return;
  var inp = document.getElementById('ci-' + id); if (!inp) return;
  var text = inp.value.trim(); if (!text) return;
  var t = null;
  for (var i=0;i<tasks.length;i++) { if (tasks[i].id===id){ t=tasks[i]; break; } }
  if (!t) return;
  if (!t.comments) t.comments = [];
  var ts = new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  t.comments.push({ts:ts, text:text});
  await persist(); inp.value = '';
  var ch = document.getElementById('ch-' + id);
  if (ch) {
    var e = document.createElement('div');
    e.className = 'comment-entry';
    e.innerHTML = '<span class="comment-ts">' + ts + '</span><span>' + xe(text) + '</span>';
    ch.appendChild(e); ch.scrollTop = ch.scrollHeight;
  }
  renderStats(); showToast('Note saved');
}

async function delTask(id) {
  if (!isEditor) return;
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(function(t){ return t.id !== id; });
  await persist(); renderAll(); showToast('Task deleted');
}

function openModal() {
  if (!isEditor) return;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('newTitle').focus(); }, 50);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');

  document.getElementById('newNote').value = '';
}
function closeModalBg(e) { if (e.target.id === 'modalOverlay') closeModal(); }

// ─────────────────────────────────────────────────────────────
// AUTO-INCREMENT ID
// ─────────────────────────────────────────────────────────────
function nextId(cat) {
  var prefix = {
    ALARMS:      'A',
    ELECTRICAL:  'E',
    PROGRAMMING: 'P',
    MECHANICAL:  'M',
    PLC:         'PLC'
  }[cat] || 'T';

  // Find all existing numeric IDs for this prefix
  var nums = tasks
    .map(function(t) { return t.id || ''; })
    .filter(function(id) {
      return id.toLowerCase().startsWith(prefix.toLowerCase());
    })
    .map(function(id) {
      var n = parseInt(id.replace(new RegExp('^' + prefix, 'i'), ''), 10);
      return isNaN(n) ? 0 : n;
    });

  var max = nums.length ? Math.max.apply(null, nums) : 0;
  return prefix + (max + 1);
}

async function addTask() {
  if (!isEditor) return;
  var title = document.getElementById('newTitle').value.trim();
  if (!title) { document.getElementById('newTitle').style.borderColor = 'var(--red)'; return; }
  document.getElementById('newTitle').style.borderColor = '';
  var cat  = document.getElementById('newCat').value;
  var prio = document.getElementById('newPrio').value;
  var mach = document.getElementById('newMach').value;
  var note = document.getElementById('newNote').value.trim();
  var ts = new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  var newId = nextId(cat);
  var nt = {
    id: newId, cat:cat, title:title, prio:prio, mach:mach, done:false,
    createdAt: new Date().toISOString(),
    comments: note ? [{ts:ts, text:note}] : []
  };
  tasks.push(nt); await persist(); closeModal(); renderAll(); showToast('Task added');
  setTimeout(function(){
    var el = document.getElementById('card-' + nt.id);
    if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 120);
}

var _tt;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

  var a = document.createElement('a');
  a.href = url;
  a.download = 'V0653_Daily_Report_'+todayShort+'.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Daily report downloaded!','success');
}

function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

// ─────────────────────────────────────────────────────────────
// BOOT — synchronous, tasks show immediately
// ─────────────────────────────────────────────────────────────
boot();
updateLockBtn();
</script>
